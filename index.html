<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Efek 3D Skeuomorphic kustom */
        .card-3d {
            background: linear-gradient(145deg, #1f2937, #111827);
            box-shadow: 8px 8px 16px #0b0f19, -8px -8px 16px #273345;
            border: 1px solid rgba(20, 184, 166, 0.1);
        }
        .btn-3d {
            background: linear-gradient(145deg, #12a696, #16c6b3);
            box-shadow: 4px 4px 8px #0b0f19, -4px -4px 8px #273345;
            transition: all 0.2s ease;
        }
        .btn-3d:active {
            box-shadow: inset 4px 4px 8px #0f8a7d, inset -4px -4px 8px #19e2cc;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 font-sans antialiased">

    <nav class="bg-gray-800 border-b border-teal-500/30 p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-teal-400 tracking-wider">HOTEL<span class="text-white">SYS</span></h1>
            <span class="text-sm bg-teal-900 text-teal-300 py-1 px-3 rounded-full border border-teal-700">Prototype v1.0</span>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8 mt-6">
        
        <div class="lg:col-span-1">
            <div class="card-3d rounded-2xl p-6">
                <h2 class="text-xl font-semibold mb-4 text-teal-400 border-b border-gray-700 pb-2">Registrasi Tamu Baru</h2>
                <form id="addGuestForm" class="space-y-4">
                    <div>
                        <label class="block text-sm mb-1 text-gray-400">Nama Lengkap</label>
                        <input type="text" id="guestName" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-teal-500 focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm mb-1 text-gray-400">Gender</label>
                            <select id="guestGender" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-teal-500 focus:outline-none">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm mb-1 text-gray-400">No. Identitas</label>
                            <input type="text" id="guestIdNumber" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-teal-500 focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm mb-1 text-gray-400">Email</label>
                        <input type="email" id="guestEmail" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-teal-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm mb-1 text-gray-400">No. HP</label>
                        <input type="text" id="guestPhone" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-teal-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm mb-1 text-gray-400">Alamat</label>
                        <textarea id="guestAddress" rows="2" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2.5 text-white focus:ring-2 focus:ring-teal-500 focus:outline-none"></textarea>
                    </div>
                    <button type="submit" class="btn-3d w-full text-white font-bold py-3 rounded-lg mt-4">
                        Simpan Data Tamu
                    </button>
                </form>
                <div id="formStatus" class="mt-3 text-sm hidden"></div>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="card-3d rounded-2xl p-6 h-full">
                <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
                    <h2 class="text-xl font-semibold text-teal-400">Status Kamar Saat Ini</h2>
                    <button onclick="fetchRooms()" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded border border-gray-600 transition">Refresh Data</button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-800/50 text-gray-400 text-sm">
                                <th class="p-3 rounded-tl-lg">No. Kamar</th>
                                <th class="p-3">Tipe</th>
                                <th class="p-3">Lantai</th>
                                <th class="p-3">Harga</th>
                                <th class="p-3 rounded-tr-lg">Status</th>
                            </tr>
                        </thead>
                        <tbody id="roomsTableBody" class="text-sm divide-y divide-gray-800">
                            <tr>
                                <td colspan="5" class="p-4 text-center text-gray-500">Memuat data dari Supabase...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // WAJIB GANTI DUA BARIS INI DENGAN KREDENSIAL LU
        const SUPABASE_URL = 'https://gsavdoraatcmlswiqpyk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzYXZkb3JhYXRjbWxzd2lxcHlrIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODA2ODIyMiwiZXhwIjoyMDkzNjQ0MjIyfQ.k21Vb5yUJkeBQxHMIVWJXW86TgfLSRDCDJgTkaIN83Y';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Fungsi Ambil Data Kamar
        async function fetchRooms() {
            const tableBody = document.getElementById('roomsTableBody');
            
            try {
                const { data: rooms, error } = await supabase
                    .from('rooms')
                    .select('*')
                    .order('number', { ascending: true });

                if (error) throw error;

                tableBody.innerHTML = ''; // Bersihkan tabel
                
                if (rooms.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">Belum ada data kamar.</td></tr>';
                    return;
                }

                rooms.forEach(room => {
                    // Logika warna badge status
                    let statusColor = 'bg-gray-700 text-gray-300';
                    if(room.status === 'Available') statusColor = 'bg-teal-900/50 text-teal-400 border border-teal-700';
                    if(room.status === 'Occupied') statusColor = 'bg-red-900/50 text-red-400 border border-red-700';
                    if(room.status === 'Cleaning') statusColor = 'bg-blue-900/50 text-blue-400 border border-blue-700';

                    const row = `
                        <tr class="hover:bg-gray-800/30 transition">
                            <td class="p-3 font-semibold text-white">${room.number}</td>
                            <td class="p-3">${room.type}</td>
                            <td class="p-3">${room.floor}</td>
                            <td class="p-3 font-mono">Rp ${room.price.toLocaleString('id-ID')}</td>
                            <td class="p-3">
                                <span class="px-2 py-1 rounded text-xs ${statusColor}">${room.status}</span>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error fetching rooms:', error);
                tableBody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-500">Gagal mengambil data. Cek koneksi/RLS.</td></tr>`;
            }
        }

        // Fungsi Tambah Tamu
        document.getElementById('addGuestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('formStatus');
            statusDiv.className = 'mt-3 text-sm text-yellow-500 block';
            statusDiv.innerText = 'Menyimpan...';

            const newGuest = {
                full_name: document.getElementById('guestName').value,
                gender: document.getElementById('guestGender').value,
                identity_number: document.getElementById('guestIdNumber').value,
                email: document.getElementById('guestEmail').value,
                phone: document.getElementById('guestPhone').value,
                address: document.getElementById('guestAddress').value
            };

            try {
                const { error } = await supabase
                    .from('guests')
                    .insert([newGuest]);

                if (error) throw error;

                statusDiv.className = 'mt-3 text-sm text-teal-400 block';
                statusDiv.innerText = 'Tamu berhasil ditambahkan!';
                document.getElementById('addGuestForm').reset();
                
                setTimeout(() => { statusDiv.classList.add('hidden'); }, 3000);

            } catch (error) {
                console.error('Error adding guest:', error);
                statusDiv.className = 'mt-3 text-sm text-red-500 block';
                statusDiv.innerText = 'Gagal menyimpan data: ' + error.message;
            }
        });

        // Jalankan fetch pertama kali halaman dimuat
        fetchRooms();
    </script>
</body>
</html>
